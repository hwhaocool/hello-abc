name: Release

on:
  push:
    tags:
      - 'v*' # 匹配所有以 v 开头的 tag（如 v1.0.0）

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 定义构建矩阵：4 种组合
        goos: [linux, windows]
        goarch: [amd64, arm64]

    # 需要设置写权限才能自动发布
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1' # 指定你的 Go 版本
          cache: true # 启用 Go 的内置缓存

      - name: Prepare build variables
        id: prep
        run: |
          # 提取版本号（去掉 'v' 前缀）
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_NAME=hello-abc" >> $GITHUB_ENV
          
          # 根据系统确定文件扩展名
          if [ "${{ matrix.goos }}" = "windows" ]; then
            echo "BINARY_EXT=.exe" >> $GITHUB_ENV
          else
            echo "BINARY_EXT=" >> $GITHUB_ENV
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          # 创建构建目录
          mkdir -p build

          # 构建二进制文件
          BINARY_NAME="${{ env.APP_NAME }}-${{ env.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ env.BINARY_EXT }}"

          echo "Building for ${{ matrix.goos }}/${{ matrix.goarch }}..."
          echo "Binary name: $BINARY_NAME"

          go mod download
          
          # 构建命令-静态链接+版本号
          
          go build -o "build/$BINARY_NAME" -a -ldflags '-extldflags "-static" -X main.Version=${{ env.VERSION }}' .

      - name: Package artifacts
        run: |
          # 创建统一的包名
          PACKAGE_NAME="${{ env.APP_NAME }}-${{ env.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip"
          
          # 进入构建目录
          cd build
          
          # 添加二进制文件到zip
          zip -r "../$PACKAGE_NAME" .
          
          # 返回项目根目录
          cd ..

      # 发布release版本
      - name: Release version
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: ${{ env.APP_NAME }}-${{ env.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}